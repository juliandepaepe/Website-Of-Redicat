    .hero { padding: 4.5rem 0 2rem }

    .card { background: var(--card); border: 1px solid rgba(255,255,255,.06); border-radius: 1rem; padding: 1rem; display: flex; align-items: center; gap: .9rem;
            transition: border-color .15s ease, transform .15s ease, box-shadow .15s ease }
    .card:hover { border-color: rgba(229,72,77,.45); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(229,72,77,.10) }
    .card a { display: flex; align-items: center; gap: .75rem; color: var(--text); text-decoration: none; width: 100% }
    .badge { font-size: .85rem; color: var(--muted) }
    .icon { width: 28px; height: 28px; flex: 0 0 28px; color: var(--brand) }
  </style>
